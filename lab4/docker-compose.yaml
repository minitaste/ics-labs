services:
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    networks:
      - influxdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: password
      DOCKER_INFLUXDB_INIT_ORG: iks
      DOCKER_INFLUXDB_INIT_BUCKET: lab4_bucket
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: Cx4O9S5lwjQpAoHyhGnJf7oer12WClou_YLTE3zcBIoGamO29wZEgOoaVjf6RZtuhYfHldnr8g08rURD7TGu6A==
      DOCKER_INFLUXDB_INIT_RETENTION: 30d

  telegraf:
    image: telegraf:1.35.2-alpine
    container_name: telegraf
    networks:
      - influxdb
    hostname: telegraf
    depends_on:
      influxdb:
        condition: service_healthy
    volumes:
      - ./configs/telegraf.conf:/etc/telegraf/telegraf.conf:ro

volumes:
  influxdb_data:

networks:
  influxdb:
    driver: bridge
